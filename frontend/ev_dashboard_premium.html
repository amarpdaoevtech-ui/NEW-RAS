<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>EV Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0f14;
      --tile-bg: #0e1620;
      --border:  rgba(255,255,255,0.07);
      --green:   #00e87a;
      --blue:    #00b4ff;
      --orange:  #ff8c00;
      --r:       14px;
      --gap:     14px;
    }

    html, body {
      width: 1024px;
      height: 600px;
      overflow: hidden;
      background: var(--bg);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      color: #fff;
    }

    body { display: flex; flex-direction: column; }

    /* ──────────────────────────────────────────────
       HEADER  60px
    ────────────────────────────────────────────── */
    header {
      height: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, transparent 100%);
    }

    .h-left { display: flex; align-items: center; gap: 12px; }

    .logo-ring {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--green);
      box-shadow: 0 0 12px rgba(0,232,122,0.35), inset 0 0 8px rgba(0,232,122,0.1);
      display: flex; align-items: center; justify-content: center;
    }

    .logo-core {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: breathe 2.2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.45; transform:scale(0.75); }
    }

    .h-brand {
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    .h-center { display: flex; align-items: center; gap: 16px; }

    .h-div {
      width: 1px; height: 22px;
      background: rgba(255,255,255,0.07);
    }

    .h-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 8px; letter-spacing: 2px;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
    }

    .chip-dot { width: 5px; height: 5px; border-radius: 50%; }

    .h-mode-bar {
      display: flex; gap: 2px; align-items: center;
    }

    .mode-seg { width: 18px; height: 4px; border-radius: 1px; }

    .h-right { display: flex; align-items: center; gap: 14px; }

    .h-batt { display: flex; align-items: center; gap: 3px; }

    .batt-body {
      width: 26px; height: 13px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 2px;
      padding: 2px 2px;
      display: flex; gap: 1.5px;
    }

    .batt-cell { flex:1; height:100%; border-radius: 1px; background: var(--green); }

    .batt-tip {
      width: 2px; height: 7px;
      background: rgba(255,255,255,0.18);
      border-radius: 0 1px 1px 0;
      align-self: center;
    }

    .h-ts {
      font-size: 10px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 2px;
    }

    /* ──────────────────────────────────────────────
       GRID  (fills 510px between header+footer)
       padding: 1px 84px  →  grid area 856×508
       cols: 5×160  gaps: 4×14 = 856 wide
       rows: 3×160  gaps: 2×14 = 508 tall
    ────────────────────────────────────────────── */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 160px);
      grid-template-rows: repeat(3, 160px);
      gap: var(--gap);
      padding: 1px 84px;
    }

    /* ──────────────────────────────────────────────
       TILE BASE
    ────────────────────────────────────────────── */
    .tile {
      background: var(--tile-bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* top-edge shimmer */
    .tile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 40%,
        rgba(255,255,255,0.08) 60%,
        transparent 100%);
    }

    /* ──────────────────────────────────────────────
       BIG TILE  2×2 = 334×334 px
    ────────────────────────────────────────────── */
    .big {
      grid-column: 1 / 3;
      grid-row:    1 / 3;
      border-color: rgba(0,232,122,0.14);
      box-shadow:
        0 0 48px rgba(0,232,122,0.04),
        inset 0 0 40px rgba(0,232,122,0.02);
      align-items: stretch;
      justify-content: flex-start;
    }

    /* ──────────────────────────────────────────────
       FOOTER  30px
    ────────────────────────────────────────────── */
    footer {
      height: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(0deg, rgba(255,255,255,0.018) 0%, transparent 100%);
    }

    .f-group { display: flex; align-items: center; gap: 10px; }

    .f-item {
      font-size: 7.5px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.16);
      text-transform: uppercase;
    }

    .f-sep { width:1px; height:8px; background:rgba(255,255,255,0.07); }

    .f-dots { display:flex; gap:4px; align-items:center; }

    .f-dot { width:4px; height:4px; border-radius:50%; }

    /* ══════════════════════════════════════════════
       GRAPH TILE INTERNALS
    ══════════════════════════════════════════════ */
    .g-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px 6px;
      flex-shrink: 0;
    }

    .g-legend { display:flex; gap:12px; }

    .g-leg {
      display: flex; align-items: center; gap: 5px;
    }

    .g-dot { width:5px; height:5px; border-radius:50%; }

    .g-dash { width:14px; height:1.5px; border-radius:1px; }

    .g-live {
      font-size: 7px; letter-spacing:3px;
      color: rgba(255,255,255,0.18);
      display: flex; align-items:center; gap:5px;
    }

    .g-live-pulse {
      width:5px; height:5px; border-radius:50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: breathe 1.6s ease-in-out infinite;
    }

    .g-body {
      flex: 1;
      padding: 2px 14px 14px;
    }

    /* ══════════════════════════════════════════════
       TYPE 1 — CIRCULAR
    ══════════════════════════════════════════════ */
    .t-circ { gap: 10px; }

    .circ-wrap { position:relative; width:90px; height:90px; }

    .circ-val {
      position: absolute;
      top:50%; left:50%;
      transform: translate(-50%,-50%);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .circ-footer { display:flex; gap:4px; }

    .cf-bar { height:3px; border-radius:2px; }

    /* ══════════════════════════════════════════════
       TYPE 2 — HORIZONTAL BAR
    ══════════════════════════════════════════════ */
    .t-hbar {
      align-items: flex-start;
      justify-content: space-evenly;
      padding: 14px 16px;
    }

    .hb-num {
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
    }

    .hb-unit {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.35;
      margin-left: 2px;
      letter-spacing: 0;
    }

    .hb-track {
      width:100%; height:5px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px; overflow:hidden;
    }

    .hb-fill { height:100%; border-radius:3px; }

    .hb-ticks { display:flex; justify-content:space-between; width:100%; }

    .tk { width:1px; height:4px; background:rgba(255,255,255,0.11); }

    .hb-minis { display:flex; gap:3px; width:100%; }

    .hb-mini { flex:1; height:3px; border-radius:1.5px; }

    /* ══════════════════════════════════════════════
       TYPE 3 — WAVEFORM
    ══════════════════════════════════════════════ */
    .t-wave { padding: 10px; }

    /* ══════════════════════════════════════════════
       TYPE 4 — ICON + NUMBER
    ══════════════════════════════════════════════ */
    .t-icon { gap: 3px; }

    .icon-glyph { font-size:16px; opacity:0.45; }

    .icon-num {
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
    }

    .icon-sub {
      font-size: 8px;
      letter-spacing: 3px;
      opacity: 0.3;
      margin-top: 2px;
    }

    .icon-pips { display:flex; gap:4px; margin-top:6px; }

    .pip { width:6px; height:6px; border-radius:50%; }

    /* ══════════════════════════════════════════════
       TYPE 5 — SEGMENTED BARS
    ══════════════════════════════════════════════ */
    .t-seg {
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px 14px 12px;
    }

    .seg-num {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
    }

    .seg-bars {
      display: flex; gap: 3px;
      align-items: flex-end;
      width: 100%; height: 54px;
    }

    .sb { flex:1; border-radius:2px 2px 0 0; }

    .seg-ruler { width:100%; height:1px; background:rgba(255,255,255,0.08); }

    .seg-pips { display:flex; gap:4px; }

    .seg-pip { width:5px; height:5px; border-radius:50%; }

    /* ══════════════════════════════════════════════
       COLOR UTILITIES
    ══════════════════════════════════════════════ */
    .c-g  { color: var(--green);  }
    .c-b  { color: var(--blue);   }
    .c-o  { color: var(--orange); }

    .glow-g { text-shadow: 0 0 12px rgba(0,232,122,0.7);  }
    .glow-b { text-shadow: 0 0 12px rgba(0,180,255,0.7);  }
    .glow-o { text-shadow: 0 0 12px rgba(255,140,0,0.7);  }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════ -->
<header>
  <div class="h-left">
    <div class="logo-ring">
      <div class="logo-core"></div>
    </div>
    <span class="h-brand">EV · CORE · SYS</span>
  </div>

  <div class="h-center">
    <div class="h-chip">
      <div class="chip-dot" style="background:var(--green);box-shadow:0 0 5px var(--green)"></div>
      ONLINE
    </div>
    <div class="h-div"></div>
    <div class="h-mode-bar">
      <div class="mode-seg" style="background:var(--green);box-shadow:0 0 4px var(--green)"></div>
      <div class="mode-seg" style="background:var(--blue);opacity:0.7"></div>
      <div class="mode-seg" style="background:rgba(255,255,255,0.08)"></div>
    </div>
    <div class="h-div"></div>
    <div class="h-chip">
      <div class="chip-dot" style="background:var(--blue)"></div>
      LINKED
    </div>
    <div class="h-div"></div>
    <div class="h-chip">
      <div class="chip-dot" style="background:var(--orange)"></div>
      MODE · A
    </div>
  </div>

  <div class="h-right">
    <div class="h-batt">
      <div class="batt-body">
        <div class="batt-cell"></div>
        <div class="batt-cell"></div>
        <div class="batt-cell"></div>
        <div class="batt-cell" style="opacity:0.25"></div>
      </div>
      <div class="batt-tip"></div>
    </div>
    <div class="h-ts">04 · 2026</div>
  </div>
</header>

<!-- ══════════════════════════════════════════════
     GRID
══════════════════════════════════════════════ -->
<div class="grid">

  <!-- ─── BIG TILE: Multi-line graph 334×334 ─── -->
  <div class="tile big">
    <div class="g-top">
      <div class="g-legend">
        <div class="g-leg">
          <div class="g-dot" style="background:var(--green);box-shadow:0 0 5px var(--green)"></div>
          <div class="g-dash" style="background:var(--green);opacity:0.65"></div>
        </div>
        <div class="g-leg">
          <div class="g-dot" style="background:var(--blue)"></div>
          <div class="g-dash" style="background:var(--blue);opacity:0.5"></div>
        </div>
        <div class="g-leg">
          <div class="g-dot" style="background:var(--orange)"></div>
          <div class="g-dash" style="background:var(--orange);opacity:0.4"></div>
        </div>
      </div>
      <div class="g-live">
        <div class="g-live-pulse"></div>
        LIVE
      </div>
    </div>

    <div class="g-body">
      <svg width="100%" height="100%" viewBox="0 0 300 282" preserveAspectRatio="none">
        <defs>
          <!-- Grid pattern -->
          <pattern id="grid-pat" width="30" height="28.2" patternUnits="userSpaceOnUse">
            <path d="M30 0L0 0 0 28.2" fill="none" stroke="rgba(255,255,255,0.032)" stroke-width="1"/>
          </pattern>
          <!-- Gradient fills -->
          <linearGradient id="lgg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#00e87a" stop-opacity="0.28"/>
            <stop offset="100%" stop-color="#00e87a" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="lgb" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#00b4ff" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#00b4ff" stop-opacity="0"/>
          </linearGradient>
          <!-- Glow filters -->
          <filter id="fg" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="fb" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.8" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="fo" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Background grid -->
        <rect width="300" height="282" fill="url(#grid-pat)"/>

        <!-- Horizontal guide lines -->
        <line x1="0" y1="70.5"  x2="300" y2="70.5"  stroke="rgba(255,255,255,0.042)" stroke-width="0.5" stroke-dasharray="5,5"/>
        <line x1="0" y1="141"   x2="300" y2="141"    stroke="rgba(255,255,255,0.06)"  stroke-width="0.5"/>
        <line x1="0" y1="211.5" x2="300" y2="211.5"  stroke="rgba(255,255,255,0.042)" stroke-width="0.5" stroke-dasharray="5,5"/>

        <!-- X-axis baseline -->
        <line x1="0" y1="280" x2="300" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

        <!-- Y-axis ticks -->
        <line x1="0" y1="70.5"  x2="5" y2="70.5"  stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <line x1="0" y1="141"   x2="5" y2="141"    stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <line x1="0" y1="211.5" x2="5" y2="211.5"  stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

        <!-- X-axis ticks -->
        <line x1="75"  y1="276" x2="75"  y2="280" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
        <line x1="150" y1="276" x2="150" y2="280" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
        <line x1="225" y1="276" x2="225" y2="280" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>

        <!-- GREEN area fill -->
        <path d="M0,205 C28,188 55,155 80,128 C105,101 128,118 155,96
                 C182,74 207,52 232,62 C252,70 275,80 300,64 L300,280 L0,280Z"
              fill="url(#lgg)"/>
        <!-- GREEN curve -->
        <path d="M0,205 C28,188 55,155 80,128 C105,101 128,118 155,96
                 C182,74 207,52 232,62 C252,70 275,80 300,64"
              fill="none" stroke="#00e87a" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round"
              filter="url(#fg)"/>

        <!-- BLUE area fill -->
        <path d="M0,242 C28,232 55,218 80,200 C105,182 128,194 155,175
                 C182,156 207,164 232,148 C252,136 275,140 300,130 L300,280 L0,280Z"
              fill="url(#lgb)"/>
        <!-- BLUE curve -->
        <path d="M0,242 C28,232 55,218 80,200 C105,182 128,194 155,175
                 C182,156 207,164 232,148 C252,136 275,140 300,130"
              fill="none" stroke="#00b4ff" stroke-width="1.5"
              stroke-linejoin="round" filter="url(#fb)"/>

        <!-- ORANGE accent line -->
        <path d="M0,262 C40,255 80,248 120,238 C160,228 200,234 240,224
                 C265,218 285,214 300,210"
              fill="none" stroke="#ff8c00" stroke-width="1.5"
              opacity="0.75" stroke-linejoin="round" filter="url(#fo)"/>

        <!-- Live cursor -->
        <line x1="300" y1="0" x2="300" y2="280"
              stroke="rgba(255,255,255,0.09)" stroke-width="1" stroke-dasharray="3,4"/>

        <!-- Live dot — green -->
        <circle cx="300" cy="64"  r="4.5" fill="#00e87a" filter="url(#fg)"/>
        <circle cx="300" cy="64"  r="8"   fill="none" stroke="rgba(0,232,122,0.28)" stroke-width="1"/>

        <!-- Live dot — blue -->
        <circle cx="300" cy="130" r="3.5" fill="#00b4ff" filter="url(#fb)"/>
        <circle cx="300" cy="130" r="7"   fill="none" stroke="rgba(0,180,255,0.22)" stroke-width="1"/>

        <!-- Live dot — orange -->
        <circle cx="300" cy="210" r="3"   fill="#ff8c00" filter="url(#fo)"/>
      </svg>
    </div>
  </div>

  <!-- ─── T1: Circular — Green ─── -->
  <div class="tile t-circ">
    <div class="circ-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <defs>
          <filter id="cg1" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Faint outer halo -->
        <circle cx="45" cy="45" r="43" fill="none" stroke="rgba(0,232,122,0.07)" stroke-width="1"/>
        <!-- Track -->
        <circle cx="45" cy="45" r="36" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/>
        <!-- Arc (78 / 100 → dashoffset ≈ 50) -->
        <circle cx="45" cy="45" r="36" fill="none"
                stroke="#00e87a" stroke-width="7"
                stroke-linecap="round"
                stroke-dasharray="226.2" stroke-dashoffset="49.8"
                transform="rotate(-90 45 45)"
                filter="url(#cg1)"/>
        <!-- Marker dots -->
        <circle cx="45" cy="9"  r="2.5" fill="rgba(0,232,122,0.55)"/>
        <circle cx="45" cy="9"  r="2.5" fill="rgba(0,232,122,0.55)"
                transform="rotate(70 45 45)"/>
        <circle cx="45" cy="9"  r="2.5" fill="rgba(0,232,122,0.2)"
                transform="rotate(140 45 45)"/>
      </svg>
      <div class="circ-val c-g glow-g">78</div>
    </div>
    <div class="circ-footer">
      <div class="cf-bar" style="width:42px;background:rgba(0,232,122,0.5)"></div>
      <div class="cf-bar" style="width:12px;background:rgba(255,255,255,0.08)"></div>
    </div>
  </div>

  <!-- ─── T2: Icon + Number — Blue ─── -->
  <div class="tile t-icon">
    <div class="icon-glyph c-b">⚡</div>
    <div class="icon-num c-b glow-b">247</div>
    <div class="icon-sub c-b">· · ·</div>
    <div class="icon-pips">
      <div class="pip" style="background:var(--blue);box-shadow:0 0 5px var(--blue)"></div>
      <div class="pip" style="background:var(--blue);opacity:0.6"></div>
      <div class="pip" style="background:var(--blue);opacity:0.38"></div>
      <div class="pip" style="background:rgba(255,255,255,0.09)"></div>
      <div class="pip" style="background:rgba(255,255,255,0.09)"></div>
    </div>
  </div>

  <!-- ─── T3: H-Bar — Orange ─── -->
  <div class="tile t-hbar">
    <div class="hb-num c-o glow-o">64<span class="hb-unit">%</span></div>
    <div class="hb-track">
      <div class="hb-fill" style="width:64%;background:var(--orange);box-shadow:0 0 8px var(--orange)"></div>
    </div>
    <div class="hb-ticks">
      <div class="tk"></div><div class="tk"></div><div class="tk"></div>
      <div class="tk"></div><div class="tk"></div><div class="tk"></div>
      <div class="tk"></div><div class="tk"></div><div class="tk"></div>
    </div>
    <div class="hb-minis">
      <div class="hb-mini" style="background:rgba(255,140,0,0.5)"></div>
      <div class="hb-mini" style="background:rgba(255,140,0,0.5)"></div>
      <div class="hb-mini" style="background:rgba(255,140,0,0.5)"></div>
      <div class="hb-mini" style="background:rgba(255,255,255,0.06)"></div>
    </div>
  </div>

  <!-- ─── T4: Segmented Bars — Green ─── -->
  <div class="tile t-seg">
    <div class="seg-num c-g glow-g">14.8</div>
    <div class="seg-bars">
      <div class="sb" style="height:32%;background:rgba(0,232,122,0.22)"></div>
      <div class="sb" style="height:58%;background:rgba(0,232,122,0.38)"></div>

          <stop offset="0%"   stop-color="rgba(0,180,255,0.2)"/>
          <stop offset="100%" stop-color="rgba(0,180,255,0)"/>
        </linearGradient>
        <filter id="gfw" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="1.6" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>

      <rect width="140" height="140" fill="url(#wgb)"/>

      <line x1="0" y1="70" x2="140" y2="70" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>

               C120,108 130,102 140,70"
            fill="none" stroke="rgba(0,180,255,0.22)" stroke-width="1"/>

      <circle cx="62.5" cy="40" r="2.8" fill="#ff8c00" filter="url(#gfo)"/>
      <circle cx="112.5" cy="44" r="2.2" fill="#ff8c00" opacity="0.6"/>

    <div class="seg-pips">
